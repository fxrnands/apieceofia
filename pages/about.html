<!DOCTYPE html>
<html lang="en" class="is-covered">

<head>
    <meta charset="UTF-8">
    <script>document.documentElement.classList.add('is-covered')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d62f66">
    <style>
        html{background:linear-gradient(to right,#d62f66 50%,#98a74b 50%)}
        html.is-covered body{opacity:0;visibility:hidden}
    </style>
    <title>About | Apieceofia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/transitions.css">
    <link rel="stylesheet" href="../css/about.css">
</head>

<body>

    <div class="page-transition" aria-hidden="true">
        <div class="page-transition__panel page-transition__panel--left"></div>
        <div class="page-transition__panel page-transition__panel--right"></div>
    </div>

    <nav class="site-nav">
        <a class="logo" href="home.html"><img src="../assets/images/nav-logo.png" alt="Apieceofia"></a>
        <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
        </button>
        <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
            <div class="nav-drawer__backdrop" data-nav-close></div>
            <div class="nav-drawer__panel">
                <ul class="nav-links">
                    <li><a href="home.html">Home</a></li>
                    <li><a class="active" href="about.html">About Me</a></li>
                    <li><a href="portfolio/index.html">Portfolio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="about">
        <div class="photo-box photo-box--loading">
            <div class="photo-box__skeleton" aria-hidden="true"></div>
            <img src="" alt="" loading="lazy">
        </div>

        <div class="content">
            <img class="about-name" src="../assets/images/sofwatul-widad.png" alt="Sofwatul Widad">
            <h3>ABOUT ME</h3>
            <div class="about-text"></div>

            <div class="skills">
                <div class="skill-icon">
                    <img src="../assets/icons/adobe-illustrator.png" alt="Adobe Illustrator">
                </div>
                <div class="skill-icon">
                    <img src="../assets/icons/canva.png" alt="Canva">
                </div>
                <div class="skill-icon">
                    <img src="../assets/icons/ibis-paint.png" alt="ibisPaint">
                </div>
                <div class="skill-icon">
                    <img src="../assets/icons/photoshop.png" alt="Adobe Photoshop">
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="site-footer__grid">
            <div class="site-footer__map-col">
                <div class="site-footer__map">
                    <iframe
                        src="https://www.google.com/maps?q=Gg.+Pisang+No.61,+Sekaran,+Kec.+Gn.+Pati,+Kota+Semarang,+Jawa+Tengah+50229,+Indonesia&output=embed"
                        title="Apieceofia location on Google Maps"
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        allowfullscreen></iframe>
                </div>
                <address class="site-footer__address">
                    Gg. Pisang No.61, Sekaran, Kec. Gn. Pati<br>
                    Kota Semarang<br>
                    Jawa Tengah 50229, Indonesia
                </address>
                <p class="site-footer__copyright">&copy; apieceofia</p>
            </div>

            <div class="site-footer__form-col">
                <div class="site-footer__form-header">
                    <h2 class="site-footer__title">GET IN TOUCH</h2>
                    <div class="site-footer__social">
                        <a href="#" class="site-footer__social-link">WhatsApp</a>
                        <a href="#" class="site-footer__social-link">Email</a>
                        <a href="#" class="site-footer__social-link">Instagram</a>
                        <a href="#" class="site-footer__social-link">TikTok</a>
                    </div>
                </div>

                <form class="site-footer__form" action="#" method="post">
                    <input type="text" name="name" placeholder="Your Name" autocomplete="name" aria-label="Your Name">
                    <input type="email" name="email" placeholder="Your Email" autocomplete="email" aria-label="Your Email">
                    <div class="site-footer__message">
                        <textarea name="brief" placeholder="Brief" rows="6" aria-label="Brief"></textarea>
                        <button type="submit" class="site-footer__submit">Send</button>
                    </div>
                </form>
            </div>

            <div class="site-footer__photo-col">
                <div class="site-footer__placeholder site-footer__placeholder--photo" role="img" aria-label="Photo placeholder">
                    <span class="site-footer__placeholder-label">PHOTO</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/data-path.js" defer></script>
    <script src="../js/about.js" defer></script>
    <script src="../js/main.js" defer></script>
</body>

</html>
