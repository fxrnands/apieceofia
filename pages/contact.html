    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/transitions.css">
    <link rel="stylesheet" href="../css/contact.css">
</head>

<body>

    <nav class="site-nav">
        <a class="logo" href="home.html"><img src="../assets/images/nav-logo.png" alt="Apieceofia"></a>
        <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
        </button>
        <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
            <div class="nav-drawer__backdrop" data-nav-close></div>
            <div class="nav-drawer__panel">
                <ul class="nav-links">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="aboutme.html">About Me</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a class="active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <div class="column left-col">
            <div class="placeholder-box map-box">
                <span>MAPS</span>
            </div>
            <div class="address-section">
                <div class="address-title">ADDRESS</div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>

        <div class="right-section-wrapper">
            <div class="hero-title-container">
                <h1 class="hero-text">LETS WORK TOGETHER!</h1>
            </div>

            <div class="content-split">
                <div class="column middle-col">
                    <div class="form-header">
                        <h2 class="section-title">GET IN TOUCH</h2>
                        <div class="social-buttons">
                            <span class="badge">WhatsApp</span>
                            <span class="badge">Email</span>
                            <span class="badge">Instagram</span>
                            <span class="badge">TikTok</span>
                        </div>
                    </div>

                    <div class="fake-form">
                        <input type="text" placeholder="Your Name" disabled>
                        <input type="text" placeholder="Your Email" disabled>
                        <textarea placeholder="Brief" rows="6" disabled></textarea>
                        <div class="submit-container">
                            <span class="send-btn">Send</span>
                        </div>
                    </div>
                </div>

                <div class="column right-col">
                    <div class="placeholder-box photo-box">
                        <span>PHOTO</span>
                    </div>
                </div>
