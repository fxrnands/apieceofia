<!DOCTYPE html>
<html lang="en" class="is-covered">

<head>
    <meta charset="UTF-8">
    <script>document.documentElement.classList.add('is-covered')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d62f66">
    <style>
        html{background:linear-gradient(to right,#d62f66 50%,#98a74b 50%)}
        html.is-covered body{opacity:0;visibility:hidden}
    </style>
    <title>Poster Design | Apieceofia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/transitions.css">
    <link rel="stylesheet" href="../../css/carousel.css">
    <link rel="stylesheet" href="../../css/poster.css">
</head>

<body>

    <div class="page-transition" aria-hidden="true">
        <div class="page-transition__panel page-transition__panel--left"></div>
        <div class="page-transition__panel page-transition__panel--right"></div>
    </div>

    <nav class="site-nav">
        <a class="logo" href="../home.html"><img src="../../assets/images/nav-logo.png" alt="Apieceofia"></a>
        <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
        </button>
        <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
            <div class="nav-drawer__backdrop" data-nav-close></div>
            <div class="nav-drawer__panel">
                <ul class="nav-links">
                    <li><a href="../home.html">Home</a></li>
                    <li><a href="../about.html">About Me</a></li>
                    <li><a class="active" href="index.html">Portfolio</a></li>
                    <li><a href="../contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <section class="poster">
            <img class="poster-title" src="../../assets/images/poster-design.png" alt="Poster Design">

            <div class="carousel-wrap">
                <button type="button" class="carousel-arrow carousel-arrow--prev" aria-label="Previous poster">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M19 12H8M8 12l5-5M8 12l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>

                <div class="card-carousel" id="poster-carousel">
                <div class="card pos-0" data-name="Advertising Poster">
                    <span class="card-label">Advertising Poster</span>
                    <img src="https://picsum.photos/seed/poster-advertising/480/560" alt="Advertising Poster">
                    <a href="#" class="details-btn">See Details</a>
                </div>
                <div class="card pos-1" data-name="Social Campaign Poster">
                    <span class="card-label">Social Campaign Poster</span>
                    <img src="https://picsum.photos/seed/poster-social/560/680" alt="Social Campaign Poster">
                    <a href="#" class="details-btn">See Details</a>
                </div>
                <div class="card pos-2" data-name="Event Poster">
                    <span class="card-label">Event Poster</span>
                    <img src="https://picsum.photos/seed/poster-event/680/880" alt="Event Poster">
                    <a href="event.html" class="details-btn">See Details</a>
                </div>
                <div class="card pos-3" data-name="Quotes Poster">
                    <span class="card-label">Quotes Poster</span>
                    <img src="https://picsum.photos/seed/poster-quotes/560/680" alt="Quotes Poster">
                    <a href="#" class="details-btn">See Details</a>
                </div>
                <div class="card pos-4" data-name="Academic Poster">
                    <span class="card-label">Academic Poster</span>
                    <img src="https://picsum.photos/seed/poster-academic/480/560" alt="Academic Poster">
                    <a href="#" class="details-btn">See Details</a>
                </div>
                </div>

                <button type="button" class="carousel-arrow carousel-arrow--next" aria-label="Next poster">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12H16M16 12l-5-5M16 12l-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <a href="index.html" class="back-link">Back to Portfolio</a>

    <script src="../../js/main.js" defer></script>
    <script src="../../js/carousel.js" defer></script>
</body>

</html>
